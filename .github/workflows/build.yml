name: Build FaceGate (FFmpeg + libyuv + ShadowHook-static + APK + Magisk Module)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1 — Build all native C/C++ libraries for Android
  # ───────────────────────────────────────────────────────────────────────────
  build-native-libs:
    name: Native Libs (FFmpeg · libyuv · ShadowHook-static · turbojpeg)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache NDK r25c
        uses: actions/cache@v4
        with:
          path: android-ndk-r25c
          key: ndk-r25c-linux-v9

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential nasm yasm wget unzip cmake ninja-build perl python3

      - name: Download Android NDK r25c
        run: |
          if [ ! -d "android-ndk-r25c" ]; then
            wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
            unzip -q android-ndk-r25c-linux.zip
            rm android-ndk-r25c-linux.zip
          fi
          echo "NDK=$PWD/android-ndk-r25c"              >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      # ── OpenSSL ─────────────────────────────────────────────────────────────
      - name: Build OpenSSL for Android
        run: |
          git clone --depth 1 --branch openssl-3.1.4 \
            https://github.com/openssl/openssl.git openssl-src
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          API=24

          build_openssl() {
            local ABI=$1 ARCH=$2 OPTS=$3
            export ANDROID_NDK_ROOT=$NDK
            export PATH=$TOOLCHAIN/bin:$PATH
            mkdir -p openssl-src/build-$ABI
            cd openssl-src/build-$ABI
            ../Configure android-$ARCH -D__ANDROID_API__=$API \
              --prefix=$GITHUB_WORKSPACE/openssl/$ABI \
              --openssldir=$GITHUB_WORKSPACE/openssl/$ABI \
              no-shared no-tests no-ui-console $OPTS
            make -j$(nproc) && make install_sw
            cd ../..
          }
          build_openssl "arm64-v8a"   "arm64"  ""
          build_openssl "armeabi-v7a" "arm"    "no-asm"
          build_openssl "x86_64"      "x86_64" ""

      # ── FFmpeg ──────────────────────────────────────────────────────────────
      - name: Clone FFmpeg n6.1
        run: git clone --depth 1 --branch n6.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

      - name: Build FFmpeg for Android
        working-directory: ffmpeg-src
        run: |
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          API=24

          build_abi() {
            local ABI=$1 ARCH=$2 CPU=$3 TARGET=$4
            export AR=$TOOLCHAIN/bin/llvm-ar
            export NM=$TOOLCHAIN/bin/llvm-nm
            export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
            export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
            export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
            export STRIP=$TOOLCHAIN/bin/llvm-strip
            OPENSSL_PREFIX=$GITHUB_WORKSPACE/openssl/$ABI
            export CFLAGS="-O3 -fPIC -DANDROID -I$OPENSSL_PREFIX/include"
            export LDFLAGS="-fPIC -L$OPENSSL_PREFIX/lib"
            make distclean > /dev/null 2>&1 || true
            ./configure \
              --target-os=android --arch=$ARCH --cpu=$CPU --enable-cross-compile \
              --sysroot=$TOOLCHAIN/sysroot --cc=$CC --cxx=$CXX --ar=$AR --nm=$NM \
              --ranlib=$RANLIB --strip=$STRIP \
              --prefix=$GITHUB_WORKSPACE/output/$ABI \
              --pkg-config=false --enable-static --disable-shared \
              --disable-programs --disable-doc --disable-iconv \
              --disable-avdevice --disable-postproc --disable-avfilter \
              --disable-asm --disable-x86asm --enable-pic \
              --enable-jni --enable-mediacodec --enable-network \
              --enable-swresample --enable-swscale --enable-openssl \
              --extra-cflags="-I$OPENSSL_PREFIX/include" \
              --extra-ldflags="-L$OPENSSL_PREFIX/lib" \
              --enable-protocol=file,pipe,http,https,tcp,udp,rtp,rtsp,rtmp,hls \
              --enable-demuxer=rtsp,http,hls,rtmp,mov,mp4,mkv,avi,flv,mpegts,mjpeg,rawvideo \
              --enable-decoder=h264,h264_mediacodec,hevc,hevc_mediacodec,vp8,vp9,av1,aac,mp3,opus,rawvideo,pcm_s16le \
              --enable-parser=h264,hevc,vp8,vp9,av1,aac,mpegaudio,opus \
              --enable-bsf=h264_mp4toannexb,hevc_mp4toannexb,aac_adtstoasc \
              --enable-muxer=mp4,mov,matroska,null
            make -j$(nproc) && make install
          }
          build_abi "arm64-v8a"   "aarch64" "armv8-a" "aarch64-linux-android"
          build_abi "armeabi-v7a" "arm"     "armv7-a" "armv7a-linux-androideabi"
          build_abi "x86_64"      "x86_64"  "x86-64"  "x86_64-linux-android"

      # ── libyuv (Google Chromium) ─────────────────────────────────────────────
      - name: Build libyuv for Android
        run: |
          git clone --depth 1 https://chromium.googlesource.com/libyuv/libyuv libyuv-src
          LIBYUV_OUT=$GITHUB_WORKSPACE/libyuv-prebuilt
          mkdir -p $LIBYUV_OUT/include
          cp -r libyuv-src/include/libyuv* $LIBYUV_OUT/include/

          build_libyuv() {
            local ABI=$1
            mkdir -p libyuv-build-$ABI
            cmake libyuv-src \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=android-24 \
              -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
              -DCMAKE_BUILD_TYPE=MinSizeRel \
              -GNinja \
              -B libyuv-build-$ABI
            cmake --build libyuv-build-$ABI --target yuv -j$(nproc)
            mkdir -p $LIBYUV_OUT/$ABI
            cp libyuv-build-$ABI/libyuv.a $LIBYUV_OUT/$ABI/
          }
          build_libyuv "arm64-v8a"
          build_libyuv "armeabi-v7a"
          build_libyuv "x86_64"

      # ── ShadowHook — build from source as STATIC library ────────────────────
      # IMPORTANT: The Maven Central AAR only contains .so files — no .a.
      # We must build from source and patch SHARED→STATIC.
      # ShadowHook only supports armeabi-v7a and arm64-v8a (no x86_64).
      - name: Build ShadowHook from source (static, arm64+armv7 only)
        run: |
          # ── Clone with pinned tag for reproducibility ───────────────────────
          # Using a known-good tag instead of floating 'main' prevents upstream
          # breaking changes from silently breaking our build.
          git clone --branch v1.1.1 --depth 1 \
            https://github.com/bytedance/android-inline-hook.git shadowhook-src

          SH_OUT=$GITHUB_WORKSPACE/shadowhook-prebuilt
          mkdir -p "$SH_OUT/include"

          SHADOWHOOK_CMAKE="shadowhook-src/shadowhook/src/main/cpp/CMakeLists.txt"

          # ── Verify upstream file exists ────────────────────────────────────
          if [ ! -f "$SHADOWHOOK_CMAKE" ]; then
            echo "FATAL: $SHADOWHOOK_CMAKE not found after clone"
            find shadowhook-src -name "CMakeLists.txt" 2>/dev/null || true
            exit 1
          fi

          echo "=== Original CMakeLists.txt (first 5 lines) ==="
          head -n 5 "$SHADOWHOOK_CMAKE"

          # ── Patch CMakeLists.txt ────────────────────────────────────────────
          # 1. Lower cmake_minimum_required: upstream may use 3.30.5, 4.0.2, etc.
          #    Use version-agnostic regex to match ANY version string.
          sed -i 's/cmake_minimum_required(VERSION [^)]*)/cmake_minimum_required(VERSION 3.10)/' "$SHADOWHOOK_CMAKE"

          # 2. SHARED → STATIC for the main shadowhook target
          sed -i 's/add_library(${TARGET} SHARED/add_library(${TARGET} STATIC/' "$SHADOWHOOK_CMAKE"

          # 3. Remove --version-script linker flag (only valid for shared libs)
          sed -i '/-Wl,--version-script/d' "$SHADOWHOOK_CMAKE"

          # 4. Remove -Werror to prevent warnings from killing the build
          sed -i 's/-Werror//g' "$SHADOWHOOK_CMAKE"

          # 5. Remove the shadowhook_nothing target entirely (shared-only, not needed for static)
          python3 - <<'PYEOF'
          import sys
          cmake_path = 'shadowhook-src/shadowhook/src/main/cpp/CMakeLists.txt'
          with open(cmake_path, 'r') as f:
              content = f.read()
          marker = '\nset(TARGET "shadowhook_nothing")'
          idx = content.find(marker)
          if idx >= 0:
              content = content[:idx] + '\n'
              print("Removed shadowhook_nothing target")
          else:
              print("WARNING: shadowhook_nothing marker not found — upstream may have changed structure")
          with open(cmake_path, 'w') as f:
              f.write(content)
          print("CMakeLists.txt patched OK")
          PYEOF

          # ── Verify the cmake_minimum_required patch actually took effect ──
          echo "=== Verifying cmake_minimum_required patch ==="
          if grep -q "cmake_minimum_required(VERSION 3.10)" "$SHADOWHOOK_CMAKE"; then
            echo "✅ cmake_minimum_required successfully patched to 3.10"
          else
            echo "❌ FATAL: cmake_minimum_required patch FAILED. File still contains:"
            grep -n "cmake_minimum_required" "$SHADOWHOOK_CMAKE" || true
            echo "=== Full file content ==="
            cat "$SHADOWHOOK_CMAKE"
            exit 1
          fi

          echo "=== Patched CMakeLists.txt ==="
          cat "$SHADOWHOOK_CMAKE"

          # Copy public header
          cp "shadowhook-src/shadowhook/src/main/cpp/include/shadowhook.h" "$SH_OUT/include/"

          build_shadowhook() {
            local ABI=$1
            mkdir -p shadowhook-build-$ABI "$SH_OUT/$ABI"
            cmake shadowhook-src/shadowhook/src/main/cpp \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=android-21 \
              -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_C_STANDARD=99 \
              -GNinja \
              -B shadowhook-build-$ABI
            cmake --build shadowhook-build-$ABI -j$(nproc)
            STATIC_LIB=$(find shadowhook-build-$ABI -name "libshadowhook*.a" | head -1)
            if [ -z "$STATIC_LIB" ]; then
              echo "FATAL: libshadowhook*.a not found for $ABI after build"
              find shadowhook-build-$ABI -type f | sort
              exit 1
            fi
            cp "$STATIC_LIB" "$SH_OUT/$ABI/libshadowhook.a"
            echo "ShadowHook $ABI: static OK — $(file "$SH_OUT/$ABI/libshadowhook.a")"
          }

          build_shadowhook "arm64-v8a"
          build_shadowhook "armeabi-v7a"

          echo "=== ShadowHook prebuilt ==="
          find "$SH_OUT" -type f | sort

      # ── libjpeg-turbo 3.0.2 ─────────────────────────────────────────────────
      - name: Build libjpeg-turbo for Android
        run: |
          git clone --depth 1 --branch 3.0.2 \
            https://github.com/libjpeg-turbo/libjpeg-turbo.git turbojpeg-src
          TJ_OUT=$GITHUB_WORKSPACE/turbojpeg-prebuilt
          mkdir -p $TJ_OUT/include
          cp turbojpeg-src/turbojpeg.h "$TJ_OUT/include/" 2>/dev/null || true

          build_tj() {
            local ABI=$1
            mkdir -p turbojpeg-build-$ABI
            cmake turbojpeg-src \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=android-24 \
              -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
              -DCMAKE_BUILD_TYPE=MinSizeRel \
              -DENABLE_SHARED=OFF \
              -DENABLE_STATIC=ON \
              -DWITH_TURBOJPEG=ON \
              -GNinja \
              -B turbojpeg-build-$ABI
            cmake --build turbojpeg-build-$ABI --target turbojpeg-static -j$(nproc)
            mkdir -p "$TJ_OUT/$ABI"
            cp turbojpeg-build-$ABI/libturbojpeg.a "$TJ_OUT/$ABI/"
          }
          build_tj "arm64-v8a"
          build_tj "armeabi-v7a"
          build_tj "x86_64"

      # ── Upload all native artifacts ──────────────────────────────────────────
      - name: Upload FFmpeg
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-prebuilt
          path: output/
          retention-days: 14

      - name: Upload OpenSSL
        uses: actions/upload-artifact@v4
        with:
          name: openssl-android-prebuilt
          path: openssl/
          retention-days: 14

      - name: Upload libyuv
        uses: actions/upload-artifact@v4
        with:
          name: libyuv-android-prebuilt
          path: libyuv-prebuilt/
          retention-days: 14

      - name: Upload ShadowHook
        uses: actions/upload-artifact@v4
        with:
          name: shadowhook-android-prebuilt
          path: shadowhook-prebuilt/
          retention-days: 14

      - name: Upload turbojpeg
        uses: actions/upload-artifact@v4
        with:
          name: turbojpeg-android-prebuilt
          path: turbojpeg-prebuilt/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 — Build APK (itsme5) + Magisk module ZIP (no Zygisk)
  # ───────────────────────────────────────────────────────────────────────────
  build-apk-and-module:
    name: APK + Magisk Module  (facegate/)
    needs: build-native-libs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout itsme5 into facegate/
        uses: actions/checkout@v4
        with:
          repository: Amkushu999/itsme5
          token: ${{ secrets.APP_REPO_PAT }}
          path: facegate

      - name: Download FFmpeg
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-android-prebuilt
          path: facegate/ffmpeg-android

      - name: Download OpenSSL
        uses: actions/download-artifact@v4
        with:
          name: openssl-android-prebuilt
          path: facegate/openssl-android

      - name: Download libyuv
        uses: actions/download-artifact@v4
        with:
          name: libyuv-android-prebuilt
          path: facegate/libyuv-android

      - name: Download ShadowHook
        uses: actions/download-artifact@v4
        with:
          name: shadowhook-android-prebuilt
          path: facegate/shadowhook-android

      - name: Download turbojpeg
        uses: actions/download-artifact@v4
        with:
          name: turbojpeg-android-prebuilt
          path: facegate/turbojpeg-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache NDK r25c
        uses: actions/cache@v4
        with:
          path: android-ndk-r25c
          key: ndk-r25c-linux-v9

      - name: Download Android NDK r25c
        run: |
          if [ ! -d "android-ndk-r25c" ]; then
            wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
            unzip -q android-ndk-r25c-linux.zip
            rm android-ndk-r25c-linux.zip
          fi
          echo "NDK=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Generate local.properties
        working-directory: facegate
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT"                              >> local.properties
          echo "ffmpeg.dir=$GITHUB_WORKSPACE/facegate/ffmpeg-android"   >> local.properties
          echo "openssl.dir=$GITHUB_WORKSPACE/facegate/openssl-android"  >> local.properties
          echo "libyuv.dir=$GITHUB_WORKSPACE/facegate/libyuv-android"   >> local.properties

      - name: Make gradlew executable
        working-directory: facegate
        run: chmod +x ./gradlew

      - name: Install CMake + Ninja
        run: sudo apt-get install -y cmake ninja-build

      # ── Build hookProxy.so ──────────────────────────────────────────────────
      - name: Build hookProxy.so (arm64-v8a + armeabi-v7a)
        run: |
          for ABI in arm64-v8a armeabi-v7a; do
            echo "=== Building hookProxy.so for $ABI ==="

            SH_A="facegate/shadowhook-android/$ABI/libshadowhook.a"
            if [ ! -f "$SH_A" ]; then
              echo "FATAL: libshadowhook.a not found for $ABI at $SH_A"
              echo "ShadowHook build in Job 1 should have produced this file."
              exit 1
            fi

            BUILD="facegate/zygisk-build-$ABI"
            mkdir -p "$BUILD"
            cmake facegate/zygisk-module/jni \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=android-28 \
              -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_FLAGS="-static-libstdc++" \
              -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++" \
              -DSHADOWHOOK_ROOT=$GITHUB_WORKSPACE/facegate/shadowhook-android \
              -DLIBYUV_ROOT=$GITHUB_WORKSPACE/facegate/libyuv-android \
              -DTURBOJPEG_ROOT=$GITHUB_WORKSPACE/facegate/turbojpeg-android \
              -GNinja \
              -B "$BUILD"
            cmake --build "$BUILD" -j$(nproc)
            echo "=== hookProxy.so for $ABI: $(ls -lh $BUILD/libhookProxy.so) ==="
          done

      # ── Build amkush_injector (AndKittyInjector + --pid patch) ─────────────
      - name: Build amkush_injector (ptrace injection binary — --pid patched)
        run: |
          if [ ! -f "$NDK/ndk-build" ]; then
            echo "ERROR: ndk-build not found at $NDK/ndk-build"
            exit 1
          fi

          echo "=== Cloning AndKittyInjector (upstream) ==="
          git clone --recursive --depth 1 \
            https://github.com/MJx0/AndKittyInjector.git AndKittyInjector-src

          echo "=== Applying --pid patch ==="
          python3 facegate/patches/apply_andkitty_pid.py \
            AndKittyInjector-src/AndKittyInjector/src/main.cpp

          echo "=== Building (arm64-v8a + armeabi-v7a only) ==="
          sed -i 's/APP_ABI.*:=.*/APP_ABI := arm64-v8a armeabi-v7a/' \
            AndKittyInjector-src/AndKittyInjector/Application.mk
          cat AndKittyInjector-src/AndKittyInjector/Application.mk

          "$NDK/ndk-build" -C AndKittyInjector-src/AndKittyInjector \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            NDK_APPLICATION_MK=Application.mk \
            -j$(nproc)

          OUT="AndKittyInjector-src/AndKittyInjector/libs"
          echo "=== amkush_injector build output ==="
          find "$OUT" -type f | sort

          mkdir -p facegate/zygisk-module/injector-out
          [ -f "$OUT/arm64-v8a/AndKittyInjector" ]   && \
            cp "$OUT/arm64-v8a/AndKittyInjector"   facegate/zygisk-module/injector-out/amkush_injector64
          [ -f "$OUT/armeabi-v7a/AndKittyInjector" ] && \
            cp "$OUT/armeabi-v7a/AndKittyInjector" facegate/zygisk-module/injector-out/amkush_injector32

          echo "=== injector-out ==="
          ls -la facegate/zygisk-module/injector-out

      # ── Build watchdog_daemon ────────────────────────────────────────────────
      - name: Build watchdog_daemon (arm64 + armv7)
        run: |
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          WD_OUT="facegate/zygisk-module/injector-out"
          mkdir -p "$WD_OUT"

          build_watchdog() {
            local ABI=$1 TARGET=$2 API=21
            local CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
            local OUT="$WD_OUT/watchdog_daemon_${ABI//-/_}"
            $CC -O2 -pie -fPIE \
              facegate/zygisk-module/injector/watchdog_daemon.c \
              -o "$OUT" \
              -llog
            echo "watchdog_daemon $ABI: $(file $OUT)"
          }

          build_watchdog "arm64-v8a"   "aarch64-linux-android"
          build_watchdog "armeabi-v7a" "armv7a-linux-androideabi"

          echo "=== watchdog binaries ==="
          ls -la "$WD_OUT"/watchdog_daemon_*

      # ── Package module assets into APK ────────────────────────────────────
      - name: Package module assets into APK
        run: |
          ASSETS="facegate/app/src/main/assets"
          mkdir -p "$ASSETS/system/lib64" "$ASSETS/system/lib" "$ASSETS/system/bin"

          cp facegate/zygisk-module/module.prop      "$ASSETS/module.prop"
          cp facegate/zygisk-module/service.sh       "$ASSETS/service.sh"
          cp facegate/zygisk-module/post-fs-data.sh  "$ASSETS/post-fs-data.sh"
          cp facegate/zygisk-module/sepolicy.rule    "$ASSETS/sepolicy.rule"

          cp facegate/zygisk-build-arm64-v8a/libhookProxy.so   "$ASSETS/system/lib64/libhookProxy.so"
          cp facegate/zygisk-build-armeabi-v7a/libhookProxy.so "$ASSETS/system/lib/libhookProxy.so"

          INJ64="facegate/zygisk-module/injector-out/amkush_injector64"
          INJ32="facegate/zygisk-module/injector-out/amkush_injector32"
          [ -f "$INJ64" ] && cp "$INJ64" "$ASSETS/system/bin/amkush_injector64" && chmod 0755 "$ASSETS/system/bin/amkush_injector64"
          [ -f "$INJ32" ] && cp "$INJ32" "$ASSETS/system/bin/amkush_injector32" && chmod 0755 "$ASSETS/system/bin/amkush_injector32"

          WD64="facegate/zygisk-module/injector-out/watchdog_daemon_arm64_v8a"
          WD32="facegate/zygisk-module/injector-out/watchdog_daemon_armeabi_v7a"
          [ -f "$WD64" ] && cp "$WD64" "$ASSETS/system/bin/watchdog_daemon64" && chmod 0755 "$ASSETS/system/bin/watchdog_daemon64"
          [ -f "$WD32" ] && cp "$WD32" "$ASSETS/system/bin/watchdog_daemon32" && chmod 0755 "$ASSETS/system/bin/watchdog_daemon32"

          echo "=== Module assets packaged ==="
          find "$ASSETS" -type f | sort

      - name: Build Debug APK
        working-directory: facegate
        run: ./gradlew assembleDebug --stacktrace

      # ── Package Magisk module ZIP ─────────────────────────────────────────
      - name: Package Magisk module ZIP (ptrace-injection, no Zygisk)
        run: |
          PKG="facegate/magisk-pkg"
          mkdir -p "$PKG/system/lib64" "$PKG/system/lib" "$PKG/system/bin"

          cp facegate/zygisk-module/module.prop    "$PKG/"
          cp facegate/zygisk-module/service.sh     "$PKG/"
          cp facegate/zygisk-module/customize.sh   "$PKG/"
          cp facegate/zygisk-module/sepolicy.rule  "$PKG/"

          cp facegate/zygisk-build-arm64-v8a/libhookProxy.so   "$PKG/system/lib64/libhookProxy.so"
          cp facegate/zygisk-build-armeabi-v7a/libhookProxy.so "$PKG/system/lib/libhookProxy.so"

          INJ64="facegate/zygisk-module/injector-out/amkush_injector64"
          INJ32="facegate/zygisk-module/injector-out/amkush_injector32"
          [ -f "$INJ64" ] && cp "$INJ64" "$PKG/system/bin/amkush_injector64" && chmod 0755 "$PKG/system/bin/amkush_injector64" && echo "Bundled amkush_injector64"
          [ -f "$INJ32" ] && cp "$INJ32" "$PKG/system/bin/amkush_injector32" && chmod 0755 "$PKG/system/bin/amkush_injector32" && echo "Bundled amkush_injector32"

          WD64="facegate/zygisk-module/injector-out/watchdog_daemon_arm64_v8a"
          WD32="facegate/zygisk-module/injector-out/watchdog_daemon_armeabi_v7a"
          [ -f "$WD64" ] && cp "$WD64" "$PKG/system/bin/watchdog_daemon64" && chmod 0755 "$PKG/system/bin/watchdog_daemon64" && echo "Bundled watchdog_daemon64"
          [ -f "$WD32" ] && cp "$WD32" "$PKG/system/bin/watchdog_daemon32" && chmod 0755 "$PKG/system/bin/watchdog_daemon32" && echo "Bundled watchdog_daemon32"

          cd "$PKG" && zip -r "$GITHUB_WORKSPACE/facegate/FaceGate-Module.zip" . && cd -
          echo "Module ZIP: $(du -sh $GITHUB_WORKSPACE/facegate/FaceGate-Module.zip)"
          echo "=== Module contents ==="
          unzip -l "$GITHUB_WORKSPACE/facegate/FaceGate-Module.zip"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceGate-APK
          path: facegate/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Magisk module ZIP
        uses: actions/upload-artifact@v4
        with:
          name: FaceGate-Magisk-Module
          path: facegate/FaceGate-Module.zip
          retention-days: 14
